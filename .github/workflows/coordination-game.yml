name: Coordination Game

on:
  push:
    branches: [main]
    paths:
      - 'programs/coordination-game/**'
      - 'crates/shared/**'
      - 'tests/coordination-game.ts'
      - 'Anchor.toml'
      - '.github/workflows/coordination-game.yml'
      - 'sdk/**'
  pull_request:
    paths:
      - 'programs/coordination-game/**'
      - 'crates/shared/**'
      - 'tests/coordination-game.ts'
      - 'Anchor.toml'
      - '.github/workflows/coordination-game.yml'
      - 'sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: cargo fmt -p coordination-game --check
      - run: cargo clippy -p coordination-game --all-targets -- -D warnings

      - name: Generate throwaway keypair for local validator
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - name: Build programs
        run: |
          anchor build -p coordination-game
          anchor build -p shillbot

      - name: Lint coordination-game tests
        run: npx prettier "tests/coordination-game.ts" --check

      - name: Run coordination-game tests
        run: |
          anchor localnet --skip-lint &
          sleep 10
          solana airdrop 100 --url localhost --keypair /home/runner/.config/solana/id.json
          npx ts-mocha -p ./tsconfig.json -t 1000000 "tests/coordination-game.ts"
        env:
          ANCHOR_PROVIDER_URL: http://localhost:8899
          ANCHOR_WALLET: /home/runner/.config/solana/id.json

      - name: Stop local validator
        if: always()
        run: pkill -f solana-test-validator || true

  deploy-devnet:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      - name: Write deploy keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json

      - name: Write program keypairs
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/coordination_game-keypair.json
          echo '${{ secrets.SHILLBOT_PROGRAM_KEYPAIR }}' > target/deploy/shillbot-keypair.json

      - name: Build programs
        run: |
          anchor build -p coordination-game
          anchor build -p shillbot

      - name: Close orphaned buffer accounts
        run: solana program close --buffers --url devnet --keypair ~/.config/solana/id.json || true

      - name: Close IDL accounts (required when IDL size increases)
        run: |
          anchor idl close --provider.cluster devnet 2qqVk7kUqffnahiJpcQJCsSd8ErbEUgKTgCn1zYsw64P || true
          anchor idl close --provider.cluster devnet 2tR37nqMpwdV4DVUHjzUmL1rH2DtkA8zrRA4EAhT7KMi || true

      - name: Deploy both programs to devnet
        run: |
          anchor deploy -p coordination_game --provider.cluster devnet
          anchor deploy -p shillbot --provider.cluster devnet

      - name: Verify upgrade authority (post-deploy)
        run: |
          bash scripts/check-upgrade-authority.sh \
            --cluster devnet \
            --program-id 2qqVk7kUqffnahiJpcQJCsSd8ErbEUgKTgCn1zYsw64P
          bash scripts/check-upgrade-authority.sh \
            --cluster devnet \
            --program-id 2tR37nqMpwdV4DVUHjzUmL1rH2DtkA8zrRA4EAhT7KMi
        env:
          EXPECTED_MULTISIG_PUBKEY: ${{ vars.SQUADS_MULTISIG_PUBKEY }}

      - name: Publish SDK to GitHub Packages
        run: |
          cp target/types/coordination_game.ts sdk/coordination_game.ts
          node -e "
            const idl = require('./target/idl/coordination_game.json');
            const fs = require('fs');
            fs.appendFileSync('sdk/coordination_game.ts',
              '\nexport const IDL: CoordinationGame = ' + JSON.stringify(idl, null, 2) + ' as unknown as CoordinationGame;\n'
            );
          "
          cp target/types/shillbot.ts sdk/shillbot.ts
          node -e "
            const idl = require('./target/idl/shillbot.json');
            const fs = require('fs');
            fs.appendFileSync('sdk/shillbot.ts',
              '\nexport const IDL: Shillbot = ' + JSON.stringify(idl, null, 2) + ' as unknown as Shillbot;\n'
            );
          "
          # Compile TypeScript to JavaScript for Node.js consumers
          cd sdk
          npx tsc coordination_game.ts --outDir . --declaration --module nodenext --moduleResolution nodenext --target es2020 --esModuleInterop
          npm version 0.0.0-$(git rev-parse --short HEAD) --no-git-tag-version
          npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-mainnet:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked

      - name: Write deploy keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json

      - name: Write program keypairs
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/coordination_game-keypair.json

      - name: Build coordination game only
        run: anchor build -p coordination-game

      - name: Deploy coordination game to mainnet
        run: anchor deploy -p coordination_game --provider.cluster mainnet

      - name: Verify upgrade authority (mainnet)
        run: |
          bash scripts/check-upgrade-authority.sh \
            --cluster mainnet-beta \
            --program-id 2qqVk7kUqffnahiJpcQJCsSd8ErbEUgKTgCn1zYsw64P
        env:
          EXPECTED_MULTISIG_PUBKEY: ${{ vars.SQUADS_MULTISIG_PUBKEY }}
