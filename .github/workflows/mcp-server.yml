name: MCP Server & Shared Crates

on:
  push:
    branches: [main]
    paths:
      - 'services/mcp-server/**'
      - 'crates/game-api-client/**'
      - 'crates/game-chain/**'
      - 'infra/k8s/mcp-server/**'
  pull_request:
    paths:
      - 'services/mcp-server/**'
      - 'crates/game-api-client/**'
      - 'crates/game-chain/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p game-api-client -p game-chain -p mcp-server -- -D warnings
      - run: cargo test -p game-api-client -p game-chain -p mcp-server

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/_deploy-service.yml
    with:
      service: backend
      image_name: mcp-server
      dockerfile: services/mcp-server/Dockerfile
      deployment_name: mcp-server
      container_name: mcp-server
      namespace: shillbot
      k8s_manifests_dir: infra/k8s/mcp-server
    secrets: inherit
