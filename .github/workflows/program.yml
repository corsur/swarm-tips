name: Program

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - name: Generate throwaway keypair for local validator
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase --silent -o ~/.config/solana/id.json

      - run: anchor build

      - run: npm run lint

      - run: anchor test

      - name: Stop local validator
        if: always()
        run: pkill -f solana-test-validator || true

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: sudo apt-get install -y libudev-dev

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - run: npm ci

      - name: Write deploy keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOY_KEYPAIR }}' > ~/.config/solana/id.json

      - name: Write program keypair
        run: |
          mkdir -p target/deploy
          echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/coordination-keypair.json

      - run: anchor build

      - name: Deploy to devnet
        run: anchor deploy --provider.cluster devnet

      - name: Publish SDK to GitHub Packages
        run: |
          cp target/types/coordination.ts sdk/coordination.ts
          cd sdk
          npm version 0.0.0-$(git rev-parse --short HEAD) --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
