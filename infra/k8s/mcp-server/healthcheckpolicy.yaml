apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: mcp-server
  namespace: swarm-tips
spec:
  targetRef:
    group: ""
    kind: Service
    name: mcp-server
  default:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        port: 8080
