apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: swarm-tips
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      serviceAccountName: swarm-tips
      terminationGracePeriodSeconds: 300
      containers:
        - name: mcp-server
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          image: us-central1-docker.pkg.dev/coordination-game-prod/backend/mcp-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: swarm-tips-config
            - secretRef:
                name: solana-rpc-secret
                optional: true
            # Optional: enables the Layer 2 LLM classifier in
            # discovery::llm_classify. Without it, mcp-server starts in
            # degraded mode (Layer 1 + Layer 3 work; /internal/mcp/llm-classify
            # returns 503). To enable, create the K8s secret with:
            #   kubectl create secret generic xai-api-key-secret -n swarm-tips \
            #     --from-literal=XAI_API_KEY=$(gcloud secrets versions access \
            #       latest --secret=xai-api-key --project=coordination-game-prod)
            - secretRef:
                name: xai-api-key-secret
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
