apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: swarm-tips
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      serviceAccountName: swarm-tips
      terminationGracePeriodSeconds: 300
      containers:
        - name: mcp-server
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          image: us-central1-docker.pkg.dev/coordination-game-prod/backend/mcp-server:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: shillbot-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
